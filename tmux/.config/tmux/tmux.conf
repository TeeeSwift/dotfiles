# ==========================================
# --- General Settings ---
# ==========================================
# Use the environment's shell (better for Nix/macOS)
set -g default-shell $SHELL
set -g mouse on
setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g clock-mode-style 24
set -sg escape-time 10
set -g focus-events on

# Term colors
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# Don't rename windows automatically
set-option -g allow-rename off

# Reload Shortcut
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# Split panes using | and - (and stay in current path)
unbind '"'
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Clean Pane Switching (No trailing spaces)
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Session Management
bind-key N command-prompt -p "Enter session name:" "new-session -s '%%'"

# The Session Picker Popup
# Using the absolute path you specified as the reliable fix
bind-key ` display-popup -EE -h 40% -T 'Select Session' "/Users/taylor/.local/bin/tmux-session-picker"

# Set the plugin install path to be tidy
set -g @tpm_plugins_path '~/.config/tmux/plugins/'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'dracula/tmux'

# --- Dracula Theme Configuration ---
set -g @dracula-show-battery false
set -g @dracula-show-powerline false
set -g @dracula-refresh-rate 10
set -g @dracula-plugins " "
set -g @dracula-show-left-icon "🖤"

# Initialize TPM
run '~/.config/tmux/plugins/tpm/tpm'
